    <div class="page-container">

        <h1>Contact Me</h1>

        <form class="contact-form" action="https://formsubmit.co/aneelkumar0212@gmail.com" method="POST">

            <!-- Disable CAPTCHA -->
            <input type="hidden" name="_captcha" value="false">

            <!-- Redirect after submit (optional) -->
            <input type="hidden" name="_next" value="https://yourdomain.com/thanks.html">

            <label>Name:</label>
            <input type="text" name="name" placeholder="Your name" required>

            <label>Email:</label>
            <input type="email" name="email" placeholder="Your email" required>

            <label>Message:</label>
            <textarea name="message" rows="5" placeholder="Your message here..." required></textarea>

            <button type="submit">Send Message</button>

        </form>

        <a href="index.html" class="back-link">&#8592; Back to Home</a>

    </div>
